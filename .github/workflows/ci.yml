name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.4.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @mythfood/shared-kernel build
          pnpm --filter @mythfood/event-contracts build
          pnpm --filter @mythfood/common build

      - name: Lint identity-service
        run: pnpm --filter @mythfood/identity-service lint

      - name: Lint consumer-service
        run: pnpm --filter @mythfood/consumer-service lint

      - name: Lint merchant-service
        run: pnpm --filter @mythfood/merchant-service lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mythfood
          POSTGRES_PASSWORD: mythfood_secret
          POSTGRES_DB: mythfood_identity
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.4.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @mythfood/shared-kernel build
          pnpm --filter @mythfood/event-contracts build
          pnpm --filter @mythfood/common build

      - name: Run identity-service unit tests
        run: pnpm --filter @mythfood/identity-service test
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: mythfood_identity
          DATABASE_USER: mythfood
          DATABASE_PASSWORD: mythfood_secret
          JWT_SECRET: test_secret
          REDIS_URL: redis://localhost:6379

      - name: Run consumer-service unit tests
        run: pnpm --filter @mythfood/consumer-service test
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: mythfood_consumer
          DATABASE_USER: mythfood
          DATABASE_PASSWORD: mythfood_secret
          JWT_SECRET: test_secret
          REDIS_URL: redis://localhost:6379

      - name: Run merchant-service unit tests
        run: pnpm --filter @mythfood/merchant-service test
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: mythfood_merchant
          DATABASE_USER: mythfood
          DATABASE_PASSWORD: mythfood_secret
          JWT_SECRET: test_secret

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.4.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: |
          pnpm --filter @mythfood/shared-kernel build
          pnpm --filter @mythfood/event-contracts build
          pnpm --filter @mythfood/common build

      - name: Build identity-service
        run: pnpm --filter @mythfood/identity-service build

      - name: Build consumer-service
        run: pnpm --filter @mythfood/consumer-service build

      - name: Build merchant-service
        run: pnpm --filter @mythfood/merchant-service build

      - name: Upload identity-service build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: identity-dist
          path: apps/identity-service/dist/

      - name: Upload consumer-service build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: consumer-dist
          path: apps/consumer-service/dist/

      - name: Upload merchant-service build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: merchant-dist
          path: apps/merchant-service/dist/

  test-coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: [test]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mythfood
          POSTGRES_PASSWORD: mythfood_secret
          POSTGRES_DB: mythfood_identity
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.4.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @mythfood/shared-kernel build
          pnpm --filter @mythfood/event-contracts build
          pnpm --filter @mythfood/common build

      - name: Run identity-service test coverage
        run: pnpm --filter @mythfood/identity-service test:coverage
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: mythfood_identity
          DATABASE_USER: mythfood
          DATABASE_PASSWORD: mythfood_secret
          JWT_SECRET: test_secret
          REDIS_URL: redis://localhost:6379

      - name: Run consumer-service test coverage
        run: pnpm --filter @mythfood/consumer-service test:coverage
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: mythfood_consumer
          DATABASE_USER: mythfood
          DATABASE_PASSWORD: mythfood_secret
          JWT_SECRET: test_secret
          REDIS_URL: redis://localhost:6379

      - name: Run merchant-service test coverage
        run: pnpm --filter @mythfood/merchant-service test:coverage
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: mythfood_merchant
          DATABASE_USER: mythfood
          DATABASE_PASSWORD: mythfood_secret
          JWT_SECRET: test_secret

      - name: Summary
        run: echo "Coverage reports generated. Add Codecov/Sonar integration for detailed reporting."

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.4.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit || echo "Audit completed with warnings"
        continue-on-error: true